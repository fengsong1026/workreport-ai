services:
  workreport-ai:
    image: crpi-sg3816vcnxzdwweb.cn-hangzhou.personal.cr.aliyuncs.com/myworkreport/workreport-ai:latest
    container_name: workreport-ai
    restart: unless-stopped
    ports:
      - "8088:3000"
    env_file:
      - .env
    volumes:
      - ./data/db:/app/data/db
      - ./data/reports:/app/data/reports
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
