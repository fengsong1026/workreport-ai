services:
  workreport-ai:
    build: .
    image: workreport-ai:latest
    container_name: workreport-ai
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # SQLite 数据库持久化
      - ./data/db:/app/data/db
      # 生成的报告持久化
      - ./data/reports:/app/data/reports
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/data-sources"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
